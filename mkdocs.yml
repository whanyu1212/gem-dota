site_name: gem-dota
site_description: A Python Dota 2 replay parser.
site_url: https://whanyu1212.github.io/gem-dota
repo_url: https://github.com/whanyu1212/gem-dota
repo_name: whanyu1212/gem-dota
edit_uri: edit/main/docs/

hooks:
  - docs/hooks.py

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  icon:
    logo: material/diamond
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - navigation.indexes
    - toc.follow
    - content.action.edit
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - content.tabs.link
    - search.highlight
    - search.suggest
    - search.share

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            members_order: source

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/whanyu1212/gem-dota
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/gem-dota

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Understanding the Format:
    - understanding/index.md
    - "1 · Protocol Buffers": understanding/01_protobuf.md
    - "2 · The .dem Format": understanding/02_dem_format.md
    - "3 · Snappy Compression": understanding/03_snappy.md
    - "4 · Send Tables & Schema": understanding/04_send_tables.md
    - "5 · Field Paths & Huffman": understanding/05_field_paths.md
    - "6 · Field Decoders": understanding/06_field_decoders.md
    - "7 · String Tables": understanding/07_string_tables.md
    - "8 · The Entity System": understanding/08_entity_system.md
    - "9 · The Combat Log": understanding/09_combat_log.md
    - "10 · Game Events": understanding/10_game_events.md
  - Guides:
    - guides/index.md
    - "Quickstart": guides/01_quickstart.md
    - "Troubleshooting": guides/troubleshooting.md
    - "Entity State": guides/02_entity_state.md
    - "Combat Log": guides/03_combat_log.md
    - "Full Match Data": guides/04_match_data.md
    - "Time-Series & DataFrames": guides/05_timeseries.md
    - "Teamfight Detection": guides/06_teamfights.md
    - "Custom Extractors": guides/07_custom_extractors.md
    - "Laning Analysis": guides/08_laning.md
    - "CLI Reference": guides/09_cli.md
    - "Annotated JSON Output": guides/10_json_output.md
  - Architecture: architecture.md
  - API Reference:
    - Overview: reference/index.md
    - Core Parsing:
      - BitReader: reference/reader.md
      - DemoStream: reference/stream.md
      - Send Tables: reference/sendtable.md
      - Field Decoders: reference/field_decoder.md
      - Field Paths: reference/field_path.md
      - String Tables: reference/string_table.md
      - Entities: reference/entities.md
      - ReplayParser: reference/parser.md
    - Events & Combat:
      - Game Events: reference/game_events.md
      - Combat Log: reference/combatlog.md
      - Combat Aggregator: reference/combat_aggregator.md
    - Models & Outputs:
      - Models: reference/models.md
      - Reference Enums: reference/enums.md
      - Constants: reference/constants.md
      - Analysis Helpers: reference/analysis.md
      - Match Builder: reference/match_builder.md
      - DataFrames: reference/dataframes.md
      - Batch: reference/batch.md
    - Extractors:
      - reference/extractors/index.md
      - Players: reference/extractors/players.md
      - Objectives: reference/extractors/objectives.md
      - Wards: reference/extractors/wards.md
      - Courier: reference/extractors/courier.md
      - Draft: reference/extractors/draft.md
      - Teamfights: reference/extractors/teamfights.md
      - Lane Classifier: reference/extractors/lane.md
  - Sample Reports:
    - reports/index.md
